<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!--you do know we in a democracy and have choices, right? -->
<div id="menu">
  <h1>Tic Tac Toe</h1>

  <button onclick="startGame('pvp')">2 Player Mode</button>
  <button onclick="startGame('ai')">Play vs AI</button>
</div>

<!--the main point of why you clicked the link-->
<div id="game" style="display:none;">

  <h2 id="status">Our turn</h2>

  <div class="board" id="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>

  <button onclick="restartGame()">Restart</button>
  <button onclick="goBack()">Back / Exit</button>

</div>

<script src="script.js"></script>
</body>
</html>
